name: Test queue-name, job-to-wait-for, and step-to-wait-for
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          continue-after-seconds: "5"
          queue-name: "test-queue"
          job-to-wait-for: "deploy"
          step-to-wait-for: "deploy-step"
        continue-on-error: true
      - name: Assert step ran
        run: |
          echo "Action completed with queue-name, job-to-wait-for, and step-to-wait-for inputs"
          echo "PASS"
