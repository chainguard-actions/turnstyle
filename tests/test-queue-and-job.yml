name: Test queue-name and job-to-wait-for
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          queue-name: "my-custom-queue"
          job-to-wait-for: "deploy"
          step-to-wait-for: "Deploy step"
          abort-after-seconds: "5"
        continue-on-error: true
      - name: Assert action ran
        env:
          FORCE_CONTINUED: ${{ steps.action.outputs.force_continued }}
        run: |
          echo "force_continued: $FORCE_CONTINUED"
          # The action should have run and either completed or aborted
          # force_continued should be false when abort-after-seconds is used
          if [ "$FORCE_CONTINUED" != "false" ] && [ "$FORCE_CONTINUED" != "" ]; then
            echo "FAIL: unexpected force_continued value: $FORCE_CONTINUED"
            exit 1
          fi
          echo "PASS"
