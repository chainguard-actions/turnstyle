name: Test queue-name, job-to-wait-for, and step-to-wait-for
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          queue-name: "my-custom-queue"
          job-to-wait-for: "deploy"
          step-to-wait-for: "Run deployment"
          continue-after-seconds: "5"
      - name: Assert force_continued output is set
        env:
          ACTUAL: ${{ steps.action.outputs.force_continued }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "true" ] && [ "$ACTUAL" != "false" ]; then
            echo "FAIL: expected force_continued to be 'true' or 'false', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: force_continued=$ACTUAL"
