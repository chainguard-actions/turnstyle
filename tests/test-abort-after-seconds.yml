name: Test abort-after-seconds input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          abort-after-seconds: "30"
          poll-interval-seconds: "5"
          same-branch-only: "false"
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert step ran
        run: |
          echo "abort-after-seconds test completed (action may have aborted or passed)"
          echo "PASS"
