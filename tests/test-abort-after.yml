name: Test abort-after-seconds and initial-wait-seconds
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          abort-after-seconds: "30"
          initial-wait-seconds: "0"
      - name: Assert step completed
        run: |
          echo "PASS: action completed without aborting"
