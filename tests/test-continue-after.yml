name: Test continue-after-seconds
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          continue-after-seconds: "5"
          poll-interval-seconds: "10"
          same-branch-only: "false"
      - name: Assert force_continued output
        env:
          FORCE_CONTINUED: ${{ steps.action.outputs.force_continued }}
        run: |
          echo "force_continued: $FORCE_CONTINUED"
          # When no other runs are pending, force_continued should be false
          # When continue-after-seconds triggers, force_continued should be true
          # Either outcome is valid depending on environment
          if [ "$FORCE_CONTINUED" != "true" ] && [ "$FORCE_CONTINUED" != "false" ]; then
            echo "FAIL: force_continued should be 'true' or 'false', got: '$FORCE_CONTINUED'"
            exit 1
          fi
          echo "PASS: force_continued=$FORCE_CONTINUED"
